<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">工作计划</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --ink:#1a1a1a;--ink-m:#8a8a8a;--paper:#faf8f3;--paper-w:#f5f0e8;--paper-l:#e8e2d4;
  --ac:#8b3a3a;--ac-l:#c97070;--ac-p:#f2e8e8;
  --bl:#2c4a7c;--bl-l:#e8eef8;--gr:#2a5c3f;--gr-l:#e8f2ec;
  --am:#8b6914;--am-l:#fdf3d8;--bdr:#d0c8b8;--shd:rgba(80,60,30,.08);
  --sf:'Noto Serif SC','SimSun',serif;--ss:'Noto Sans SC','PingFang SC',sans-serif;--mo:'JetBrains Mono',monospace;
  --t:.18s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ss);background:var(--paper);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6}

/* ── HEADER ── */
.hdr{background:var(--ink);color:var(--paper);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:200;border-bottom:2px solid var(--ac)}
.title-wrap{display:flex;align-items:center;gap:8px}
.site-name{font-family:var(--sf);font-size:17px;font-weight:600;letter-spacing:2px;cursor:pointer;border-bottom:1px dashed rgba(255,255,255,.3);transition:var(--t)}
.site-name:hover{border-color:var(--ac-l)}
.site-name-edit{font-family:var(--sf);font-size:17px;font-weight:600;letter-spacing:1px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:var(--paper);border-radius:2px;padding:2px 8px;width:280px;display:none}
.site-name-edit:focus{outline:none;border-color:var(--ac-l)}
.nav{display:flex;gap:3px}
.nb{background:none;border:1px solid transparent;color:var(--paper);font-family:var(--ss);font-size:13px;padding:4px 12px;cursor:pointer;border-radius:2px;transition:var(--t)}
.nb:hover{background:rgba(255,255,255,.1)}
.nb.active{background:var(--ac);border-color:var(--ac)}
.hdr-r{display:flex;gap:8px;align-items:center}
.hbtn{background:none;border:1px solid rgba(255,255,255,.3);color:var(--paper);font-family:var(--ss);font-size:12px;padding:4px 11px;cursor:pointer;border-radius:2px;transition:var(--t)}
.hbtn:hover{background:rgba(255,255,255,.1)}

.app{max-width:1340px;margin:0 auto;padding:18px 18px}

/* ── DATE NAV ── */
.dnav{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:9px 14px;background:white;border:1px solid var(--bdr);border-radius:2px}
.dnb{background:none;border:1px solid var(--bdr);color:var(--ink);font-size:16px;width:30px;height:30px;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;transition:var(--t);flex-shrink:0}
.dnb:hover{background:var(--paper-w)}
.dd{flex:1;text-align:center}
.dm{font-family:var(--sf);font-size:19px;font-weight:600}
.ds{font-size:11px;color:var(--ink-m);letter-spacing:.8px}
.tb{background:var(--ac);border:none;color:white;font-size:12px;padding:4px 11px;cursor:pointer;border-radius:2px;font-family:var(--ss);flex-shrink:0}
/* dropdown nav selects */
.nav-sel{border:1px solid var(--bdr);background:var(--paper-w);color:var(--ink);font-family:var(--ss);font-size:13px;padding:4px 6px;border-radius:2px;cursor:pointer;flex-shrink:0}
.nav-sel:focus{outline:none;border-color:var(--ac)}

/* ── STATS ── */
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.sc{background:white;border:1px solid var(--bdr);padding:9px 14px;border-radius:2px;text-align:center}
.sv{font-family:var(--mo);font-size:20px;font-weight:500;line-height:1;margin-bottom:2px}
.sl{font-size:11px;color:var(--ink-m);letter-spacing:.4px}
.sc.a .sv{color:var(--ac)}.sc.b .sv{color:var(--bl)}.sc.g .sv{color:var(--gr)}

/* ── MAIN LAYOUT ── */
.pgrid{display:grid;grid-template-columns:1fr 1fr;background:white;border:1.5px solid var(--bdr);border-radius:2px;overflow:hidden;box-shadow:0 2px 10px var(--shd);position:relative}
.pgrid::after{content:'';position:absolute;top:0;bottom:0;left:50%;width:1px;background:repeating-linear-gradient(to bottom,var(--bdr) 0,var(--bdr) 4px,transparent 4px,transparent 8px);z-index:10;pointer-events:none}
.pl{padding:16px 14px 16px 16px;border-right:1px solid var(--bdr);display:flex;flex-direction:column;gap:12px;background:var(--paper)}
.pr{padding:16px 16px 16px 14px;display:flex;flex-direction:column;gap:12px;background:white}
.ptitle{font-family:var(--sf);font-size:11px;font-weight:600;color:var(--ink-m);letter-spacing:2px;padding-bottom:6px;border-bottom:1px solid var(--paper-l);margin-bottom:0}

/* ── UNIFIED TIMELINE ── */
.utl-wrap{display:flex;overflow-y:auto;flex:1}
.utl-ax{display:flex;flex-direction:column;width:42px;flex-shrink:0;padding-right:8px;position:relative}
.utl-ax::after{content:'';position:absolute;right:0;top:0;bottom:0;width:1.5px;background:var(--ac);opacity:.3}
.utl-slot{min-height:48px;display:flex;align-items:flex-start;padding-top:6px}
.utl-lbl{font-family:var(--mo);font-size:9.5px;color:var(--ink-m);white-space:nowrap;position:relative}
.utl-lbl::after{content:'';position:absolute;right:-12px;top:5px;width:8px;height:1px;background:var(--ac);opacity:.3}
.utl-rows{flex:1;display:flex;flex-direction:column}

/* 3-column layout: name | plan-time | actual-time+diff */
.utl-row{min-height:48px;display:grid;grid-template-columns:minmax(80px,1.6fr) minmax(90px,1fr) minmax(100px,1fr);align-items:start;padding:5px 7px;border-bottom:1px dashed var(--paper-l);position:relative;transition:background var(--t)}
.utl-row:hover{background:var(--paper-w)}

/* column header row */
.utl-col-hdr{display:grid;grid-template-columns:minmax(80px,1.6fr) minmax(90px,1fr) minmax(100px,1fr);padding:3px 7px 3px;border-bottom:1px solid var(--paper-l);background:var(--paper-w)}
.utl-hdr-cell{font-size:9px;color:var(--ink-m);letter-spacing:.6px;text-align:left}
.utl-hdr-cell:nth-child(2){padding-left:4px}
.utl-hdr-cell:nth-child(3){padding-left:4px}

/* name column */
.utl-col-name{display:flex;flex-direction:column;gap:3px;padding-right:5px}
/* plan time column */
.utl-col-plan{display:flex;flex-direction:column;gap:3px;padding:0 4px;border-left:1px solid var(--paper-l)}
/* actual+diff column */
.utl-col-actual{display:flex;flex-direction:column;gap:3px;padding-left:4px;border-left:1px solid var(--paper-l)}

/* each row entry — name part */
.utl-name-entry{display:flex;align-items:center;gap:5px;min-height:22px}
.utl-plan-dot{width:7px;height:7px;border-radius:50%;background:var(--am);flex-shrink:0;opacity:.8}
.utl-plan-dot.is-extra{background:#6b3fa0;border-radius:2px}
.utl-plan-dot.is-cont{opacity:.3}
.utl-plan-txt{font-size:11px;color:var(--ink);font-family:var(--ss);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.utl-plan-txt.is-done{text-decoration:line-through;color:var(--ink-m)}
.utl-extra-tag{font-size:8px;padding:1px 5px;background:#6b3fa0;color:white;border-radius:2px;white-space:nowrap;flex-shrink:0}

/* time badge — filled color pill */
.utl-time-badge{display:inline-flex;align-items:center;font-family:var(--mo);font-size:9px;font-weight:500;padding:2px 6px;border-radius:3px;white-space:nowrap;min-height:18px;line-height:1.2}
.utl-time-badge.plan{background:rgba(139,105,20,.15);color:#6b5000}
.utl-time-badge.plan.is-cont{background:rgba(139,105,20,.07);color:#a08030;font-size:8px}
.utl-time-badge.actual-same{background:rgba(42,92,63,.18);color:#1a4830}
.utl-time-badge.actual-done{background:rgba(42,92,63,.18);color:#1a4830}
.utl-time-badge.actual-partial{background:rgba(139,105,20,.2);color:#6b5000}
.utl-time-badge.actual-deviation{background:rgba(139,58,58,.18);color:#7a1a1a}
.utl-time-badge.actual-extra{background:rgba(107,63,160,.16);color:#3d1878}
.utl-time-badge.empty{background:transparent}

/* diff badge */
.utl-diff-badge{font-family:var(--mo);font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-left:3px}
.utl-diff-badge.over{background:rgba(139,58,58,.15);color:#8b3a3a}
.utl-diff-badge.under{background:rgba(42,92,63,.15);color:#2a5c3f}
.utl-diff-badge.exact{background:rgba(42,92,63,.1);color:#2a5c3f}

/* ── FREE TIME GAP (shown in axis between hour labels) ── */
.utl-gap-rule{flex:1;height:1px;background:repeating-linear-gradient(to right,rgba(42,92,63,.25) 0,rgba(42,92,63,.25) 4px,transparent 4px,transparent 8px)}
.utl-gap-label{font-family:var(--ss);font-size:9px;color:rgba(42,92,63,.7);margin-left:5px;white-space:nowrap}
.utl-gap-badge{font-family:var(--mo);font-size:8.5px;font-weight:700;color:#3d7a3d;background:rgba(42,92,63,.11);border:1px dashed rgba(42,92,63,.35);border-radius:3px;padding:1px 4px;white-space:nowrap;line-height:1.4}

/* plan-time slot wrapper */
.utl-plan-slot{display:flex;align-items:center;min-height:22px}
.utl-actual-slot{display:flex;align-items:center;gap:3px;min-height:22px}

/* row states */
.utl-row.has-plan{background:linear-gradient(to right,rgba(139,105,20,.03),transparent)}
.utl-row.has-plan::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--am);border-radius:2px;opacity:.5;z-index:1}
.utl-row.is-deviation{background:linear-gradient(to right,rgba(139,58,58,.05),transparent) !important}
.utl-row.is-deviation::before{background:var(--ac) !important;opacity:.8}
.utl-row.has-extra{background:linear-gradient(to right,rgba(107,63,160,.04),transparent)}
.utl-row.has-extra.no-plan::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:#6b3fa0;border-radius:2px;opacity:.6}
.utl-row.is-cont{background:linear-gradient(to right,rgba(139,105,20,.02),transparent)}
.utl-row.is-cont::before{opacity:.2 !important}

/* note line */
.utl-note{font-size:9px;color:var(--ink-m);padding-left:12px;white-space:normal;overflow:visible;word-break:break-word;font-family:var(--ss);line-height:1.5}

/* ── MINI TASKS BOTTOM SECTION ── */
.utl-mini-section{margin-top:10px;border-top:2px dashed rgba(42,92,63,.25);padding-top:8px}
.utl-mini-title{font-size:10px;color:rgba(42,92,63,.8);font-family:var(--ss);font-weight:500;letter-spacing:.8px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.utl-mini-title::after{content:'';flex:1;height:1px;background:rgba(42,92,63,.15)}
.utl-mini-row{display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:2px;background:rgba(42,92,63,.04);border:1px dashed rgba(42,92,63,.18);margin-bottom:4px}
.utl-mini-check{color:var(--gr);font-size:11px;flex-shrink:0}
.utl-mini-tag{font-size:8px;padding:1px 5px;border-radius:2px;flex-shrink:0;white-space:nowrap}
.utl-mini-tag.tag-todo{background:rgba(44,74,124,.12);color:#2c4a7c}
.utl-mini-tag.tag-otask{background:rgba(107,63,160,.12);color:#3d1878}
.utl-mini-tag.tag-memo{background:rgba(139,105,20,.18);color:#6b5000}
.utl-mini-txt{font-size:11px;color:var(--ink-m);text-decoration:line-through;flex:1;font-family:var(--ss)}
.utl-mini-note{font-size:9px;color:var(--ink-m);font-style:italic;white-space:normal;word-break:break-word}

/* legacy compat */
.utl-item{display:flex;align-items:center;min-height:20px}
.utl-item-plan{display:flex;align-items:center;gap:4px;flex:1;min-width:0}
.utl-sep{display:none}
.utl-item-actual{display:flex;align-items:center;gap:3px}
.utl-actual-dot{display:none}
.utl-actual-time{display:none}
.utl-actual-name{display:none}
.utl-dev-badge{display:none}
.utl-extra-dot{display:none}
.utl-extra-txt{display:none}
.utl-extra-time{display:none}
.utl-plan-time{display:none}
.utl-connector{display:none}

/* ── MULTI-SEGMENT TIME BLOCKS ── */
.time-segs{display:flex;flex-direction:column;gap:4px;margin-bottom:5px}
.time-seg{display:grid;grid-template-columns:1fr 1fr auto;gap:5px;align-items:end;background:rgba(44,74,124,.04);border:1px dashed var(--bdr);border-radius:2px;padding:5px 7px}
.time-seg.otask-seg{background:rgba(107,63,160,.04)}
.time-seg-lbl{font-size:9px;color:var(--ink-m);margin-bottom:2px}
.time-seg-del{background:none;border:none;cursor:pointer;color:var(--ink-m);font-size:13px;padding:0 3px;line-height:1;opacity:.5;transition:opacity var(--t);align-self:flex-end;padding-bottom:3px}
.time-seg-del:hover{opacity:1;color:var(--ac)}
.add-seg-btn{background:none;border:1px dashed var(--bdr);color:var(--ink-m);font-family:var(--ss);font-size:10px;padding:3px 9px;cursor:pointer;border-radius:2px;transition:all var(--t);width:100%}
.add-seg-btn:hover{border-color:var(--bl);color:var(--bl)}

/* ── COMBO (hour dropdown + type) ── */
.tfields{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.tfield label{display:block;font-size:10px;color:var(--ink-m);margin-bottom:2px;letter-spacing:.4px}
.combo{position:relative}
.combo input{width:100%;border:1px solid var(--bdr);background:white;color:var(--ink);font-family:var(--mo);font-size:12px;padding:5px 22px 5px 7px;border-radius:2px}
.combo input:focus{outline:none;border-color:var(--ac)}
.combo::after{content:'▾';position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--ink-m);pointer-events:none}

/* ── PANEL DIVIDER ── */
.panel-divider{height:1px;background:var(--bdr);flex-shrink:0}

/* legend */
.exec-legend{display:flex;gap:10px;align-items:center;padding:4px 0 2px;font-size:10px;color:var(--ink-m);flex-wrap:wrap}
.leg-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px}

/* ── TODO CARDS ── */
.tlist{display:flex;flex-direction:column;gap:7px}
.tcard{border:1px solid var(--bdr);border-radius:2px;background:white;overflow:hidden;transition:border-color var(--t)}
.tcard.done{background:var(--gr-l);border-color:#b8d8c0}
.tcard.done .ttxt{text-decoration:line-through;color:var(--ink-m)}
.ttop{display:flex;align-items:flex-start;gap:6px;padding:7px 9px 5px}
.tpri{width:19px;height:19px;border-radius:50%;background:var(--ac);color:white;font-size:9px;font-family:var(--mo);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;margin-top:1px;user-select:none;font-weight:500}
.tpri.p2{background:var(--bl)}.tpri.p3{background:var(--ink-m)}
.tchk{width:15px;height:15px;border:1.5px solid var(--bdr);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:white;transition:all var(--t);margin-top:2px;font-size:9px;cursor:default}
.tchk.ck{background:var(--gr);border-color:var(--gr);color:white}
.tbody{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.ttxt{font-size:12px;color:var(--ink);border:none;background:transparent;width:100%;font-family:var(--ss);resize:none;min-height:17px;line-height:1.4}
.ttxt:focus{outline:none}
.tmeta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ttime{font-family:var(--mo);font-size:10px;color:var(--bl);padding:1px 5px;background:var(--bl-l);border-radius:2px;white-space:nowrap}
.tacts{display:flex;gap:2px;opacity:0;transition:opacity var(--t);flex-shrink:0}
.tcard:hover .tacts{opacity:1}
.ib{background:none;border:none;cursor:pointer;color:var(--ink-m);padding:2px;font-size:11px;transition:color var(--t)}
.ib:hover{color:var(--ac)}
.etoggle{font-size:9px;color:var(--ink-m);cursor:pointer;padding:1px 6px;border:1px solid var(--paper-l);border-radius:2px;background:none;font-family:var(--ss);transition:all var(--t)}
.etoggle:hover{border-color:var(--ac);color:var(--ac)}

/* exec section */
.esec{border-top:1px dashed var(--paper-l);padding:7px 9px;background:rgba(255,255,255,.6)}
.erow{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.elbl{font-size:10px;color:var(--ink-m);min-width:38px;white-space:nowrap}
.estat{font-size:10px;padding:1px 9px;border-radius:10px;cursor:pointer;border:1px solid transparent;white-space:nowrap;user-select:none;font-family:var(--ss)}
.estat.pending{background:var(--paper-w);color:var(--ink-m);border-color:var(--bdr)}
.estat.done{background:#c8e6d0;color:var(--gr);border-color:#b0d4bc}
.etimes{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:5px}
.etf{display:flex;flex-direction:column;gap:1px}
.etl{font-size:9px;color:var(--ink-m)}
.eti{font-family:var(--mo);font-size:10px;color:var(--ink);border:1px solid var(--bdr);background:white;padding:3px 4px;border-radius:2px;width:100%}
.eti:focus{outline:none;border-color:var(--ac)}
.enote{font-size:11px;color:var(--ink);border:1px solid var(--bdr);background:white;padding:4px 6px;border-radius:2px;width:100%;resize:none;font-family:var(--ss);min-height:30px;line-height:1.5}
.enote:focus{outline:none;border-color:var(--ac)}

/* add button */
.addbtn{background:none;border:1px dashed var(--bdr);color:var(--ink-m);font-family:var(--ss);font-size:12px;padding:5px 14px;cursor:pointer;border-radius:2px;transition:all var(--t);width:100%}
.addbtn:hover{border-color:var(--ac);color:var(--ac);background:var(--ac-p)}

/* OTHER TASKS (no-time) */
.otask-list{display:flex;flex-direction:column;gap:5px}
.otask{display:flex;flex-direction:column;gap:0;border:1px solid var(--bdr);border-radius:2px;background:white;overflow:hidden}
.otask.ck{background:var(--gr-l);border-color:#b8d8c0}
.otask-top{display:flex;align-items:center;gap:6px;padding:5px 8px}
.otask-chk{width:15px;height:15px;border:1.5px solid var(--bdr);border-radius:2px;cursor:default;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:white;transition:all var(--t);font-size:9px}
.otask-chk.ck{background:var(--gr);border-color:var(--gr);color:white}
.otask-txt{flex:1;border:none;background:transparent;font-family:var(--ss);font-size:12px;color:var(--ink);padding:0}
.otask-txt:focus{outline:none}
.otask.ck .otask-txt{text-decoration:line-through;color:var(--ink-m)}
.otask-del{background:none;border:none;cursor:pointer;color:var(--ink-m);font-size:11px;opacity:0;transition:opacity var(--t)}
.otask:hover .otask-del{opacity:1}
.otask-toggle{font-size:9px;color:var(--ink-m);cursor:pointer;padding:1px 6px;border:1px solid var(--paper-l);border-radius:2px;background:none;font-family:var(--ss);transition:all var(--t);flex-shrink:0}
.otask-toggle:hover{border-color:#6b3fa0;color:#6b3fa0}
.otask-mv{font-size:9px;color:var(--ink-m);cursor:pointer;padding:1px 6px;border:1px solid var(--paper-l);border-radius:2px;background:none;font-family:var(--ss);transition:all var(--t);flex-shrink:0}
.otask-mv:hover{border-color:var(--am);color:var(--am);background:var(--am-l)}
/* otask exec section */
.otask-exec{border-top:1px dashed var(--paper-l);padding:6px 8px;background:rgba(107,63,160,.04);display:flex;flex-direction:column;gap:5px}
.otask-times{display:flex;gap:8px;align-items:center}
.otl{font-size:9px;color:var(--ink-m);white-space:nowrap}
.oti{font-family:var(--mo);font-size:10px;color:var(--ink);border:1px solid var(--bdr);background:white;padding:2px 4px;border-radius:2px;width:62px}
.oti:focus{outline:none;border-color:#6b3fa0}
.otnote{font-size:11px;color:var(--ink);border:1px solid var(--bdr);background:white;padding:3px 5px;border-radius:2px;width:100%;resize:none;font-family:var(--ss);min-height:28px;line-height:1.5}
.otnote:focus{outline:none;border-color:#6b3fa0}
/* reflection — bigger, extends below timeline */
.refbox{border:1px solid #b8c8e8;border-radius:2px;padding:9px 11px;background:var(--bl-l);flex:1;display:flex;flex-direction:column}
.reftitle{font-family:var(--sf);font-size:10px;color:var(--bl);margin-bottom:5px;letter-spacing:1px;flex-shrink:0}
.refta{width:100%;border:none;background:transparent;color:var(--ink);font-family:var(--sf);font-size:12px;resize:none;line-height:1.8;min-height:120px;flex:1}
.refta:focus{outline:none}

/* WEATHER PICKER */
.wx-row{display:flex;align-items:center;gap:6px;margin-top:2px}
.wx-lbl{font-size:10px;color:var(--ink-m);white-space:nowrap}
.wx-opts{display:flex;gap:3px;flex-wrap:wrap}
.wx-btn{background:none;border:1px solid var(--bdr);border-radius:3px;font-size:15px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t);position:relative}
.wx-btn:hover{border-color:var(--am);background:var(--am-l)}
.wx-btn.selected{border-color:var(--am);background:var(--am-l);box-shadow:0 0 0 1.5px var(--am)}
.wx-btn title{display:none}
.wx-clear{font-size:11px;color:var(--ink-m);background:none;border:none;cursor:pointer;padding:0 2px;opacity:.5}
.wx-clear:hover{opacity:1;color:var(--ac)}

/* DRAG AND DROP */
.dragging{opacity:.4;cursor:grabbing !important}
.drag-over{border-top:2px solid var(--ac) !important}
.drag-handle{cursor:grab;color:var(--ink-m);font-size:12px;padding:2px 3px;flex-shrink:0;opacity:.4;transition:opacity var(--t);user-select:none;line-height:1}
.drag-handle:hover{opacity:.9}
.tcard:hover .drag-handle{opacity:.7}
.otask:hover .drag-handle{opacity:.7}

/* MEMO SECTION */
.memo-section{display:flex;flex-direction:column;gap:5px}
.memo-list{display:flex;flex-direction:column;gap:5px}
.memo-item{display:flex;flex-direction:column;gap:0;border:1px solid var(--bdr);border-radius:2px;background:white;overflow:hidden;transition:all var(--t)}
.memo-item:hover{border-color:var(--am)}
.memo-item.ck{background:var(--gr-l);border-color:#b8d8c0}
.memo-item-top{display:flex;align-items:center;gap:6px;padding:5px 8px}
.memo-item-drag{cursor:grab;color:var(--ink-m);font-size:12px;padding:2px 3px;opacity:.4;flex-shrink:0;user-select:none;line-height:1}
.memo-item:hover .memo-item-drag{opacity:.7}
.memo-chk{width:15px;height:15px;border:1.5px solid var(--bdr);border-radius:2px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:white;transition:all var(--t);font-size:9px}
.memo-chk.ck{background:var(--gr);border-color:var(--gr);color:white}
.memo-ta{flex:1;border:none;background:transparent;font-family:var(--ss);font-size:12px;color:var(--ink);padding:0;line-height:1.5}
.memo-ta:focus{outline:none}
.memo-item.ck .memo-ta{text-decoration:line-through;color:var(--ink-m)}
.memo-del{background:none;border:none;cursor:pointer;color:var(--ink-m);font-size:11px;opacity:0;transition:opacity var(--t);flex-shrink:0;padding:0 2px}
.memo-item:hover .memo-del{opacity:1}
.memo-toggle{font-size:9px;color:var(--ink-m);cursor:pointer;padding:1px 6px;border:1px solid var(--paper-l);border-radius:2px;background:none;font-family:var(--ss);transition:all var(--t);flex-shrink:0}
.memo-toggle:hover{border-color:var(--am);color:var(--am)}
.memo-mv{font-size:9px;color:var(--ink-m);cursor:pointer;padding:1px 6px;border:1px solid var(--paper-l);border-radius:2px;background:none;font-family:var(--ss);transition:all var(--t);flex-shrink:0}
.memo-mv:hover{border-color:var(--am);color:var(--am);background:var(--am-l)}
/* memo exec section */
.memo-exec{border-top:1px dashed var(--paper-l);padding:6px 8px;background:rgba(139,105,20,.04);display:flex;flex-direction:column;gap:5px}
.memo-times{display:flex;gap:8px;align-items:center}
.mtl{font-size:9px;color:var(--ink-m);white-space:nowrap}
.mti{font-family:var(--mo);font-size:10px;color:var(--ink);border:1px solid var(--bdr);background:white;padding:2px 4px;border-radius:2px;width:62px}
.mti:focus{outline:none;border-color:var(--am)}
.mnote{font-size:11px;color:var(--ink);border:1px solid var(--bdr);background:white;padding:3px 5px;border-radius:2px;width:100%;resize:none;font-family:var(--ss);min-height:28px;line-height:1.5}
.mnote:focus{outline:none;border-color:var(--am)}
.memo-del:hover{color:var(--ac)}

/* views */
.vw{display:none}.vw.active{display:block}

/* MONTHLY */
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:12px}
.mhdr{text-align:center;font-size:11px;color:var(--ink-m);padding:3px 0;letter-spacing:1px}
.mc{min-height:72px;border:1px solid var(--bdr);border-radius:2px;padding:4px;background:white;cursor:pointer;transition:all var(--t)}
.mc:hover{border-color:var(--ac);background:var(--ac-p)}
.mc.td{border:2px solid var(--ac)}.mc.om{background:var(--paper);opacity:.4;pointer-events:none}
.mcd{font-family:var(--mo);font-size:11px;color:var(--ink-m);margin-bottom:3px}
.mc.td .mcd{color:var(--ac);font-weight:500}
.mdots{display:flex;gap:2px;flex-wrap:wrap}
.mdot{width:6px;height:6px;border-radius:50%;background:var(--ac-l)}
.mdot.dn{background:var(--gr)}
.mcomp{font-size:9px;color:var(--ink-m);margin-top:2px;font-family:var(--mo)}

/* YEARLY */
.ygrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:12px}
.ymc{background:white;border:1px solid var(--bdr);border-radius:2px;padding:11px;cursor:pointer;transition:all var(--t)}
.ymc:hover{border-color:var(--ac)}
.ymn{font-family:var(--sf);font-size:14px;color:var(--ink);margin-bottom:6px;border-bottom:1px solid var(--paper-l);padding-bottom:4px}
.ymst{font-size:11px;color:var(--ink-m);line-height:2}
.pb{height:4px;background:var(--paper-l);border-radius:2px;margin-top:3px;overflow:hidden}
.pf{height:100%;background:var(--gr);border-radius:2px;transition:width .3s ease}

/* EXPORT */
.expp{position:fixed;top:0;right:0;bottom:0;width:320px;background:white;border-left:2px solid var(--bdr);z-index:300;padding:22px;overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;box-shadow:-4px 0 20px var(--shd)}
.expp.open{transform:translateX(0)}
.expt{font-family:var(--sf);font-size:16px;color:var(--ink);margin-bottom:16px;padding-bottom:9px;border-bottom:1px solid var(--bdr)}
.exps{margin-bottom:14px}
.expsl{font-size:10px;color:var(--ink-m);letter-spacing:1px;margin-bottom:7px}
.expo{display:flex;align-items:center;gap:9px;padding:8px 11px;border:1px solid var(--bdr);border-radius:2px;cursor:pointer;margin-bottom:4px;transition:all var(--t)}
.expo:hover{border-color:var(--ac);background:var(--ac-p)}
.expoi{font-size:14px;width:20px;text-align:center}
.expon{font-size:12px;font-weight:500;color:var(--ink)}
.expod{font-size:10px;color:var(--ink-m)}
.expclose{position:absolute;top:14px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-m)}
.expsel{border:1px solid var(--bdr);background:var(--paper-w);color:var(--ink);font-family:var(--ss);font-size:12px;padding:5px 8px;border-radius:2px;width:100%;margin-bottom:7px}
.expsel:focus{outline:none;border-color:var(--ac)}

/* saved */
.saved{position:fixed;bottom:18px;right:18px;background:var(--gr);color:white;font-size:11px;padding:4px 11px;border-radius:2px;opacity:0;transition:opacity .3s ease;pointer-events:none;font-family:var(--ss);z-index:400}
.saved.show{opacity:1}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

@media(max-width:820px){
  .pgrid{grid-template-columns:1fr}.pgrid::after{display:none}
  .sbar{grid-template-columns:repeat(2,1fr)}.ygrid{grid-template-columns:repeat(2,1fr)}
  .expp{width:100%}.nav{display:none}
  .etimes{grid-template-columns:repeat(2,1fr)}
}

<script>
// ── CONSTANTS ──
const HOURS=['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00',
             '14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00','23:00'];
const WD=['日','一','二','三','四','五','六'];
const MCN=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const SCYCLE=['pending','done'];
const SL={pending:'待执行',done:'已完成'};

// ── STATE ──
let currentDate=new Date();
let currentMonth=currentDate.getMonth();
let currentYear=currentDate.getFullYear();
let saveT=null;

// ── TITLE ──
function initTitle(){
  const name=localStorage.getItem('site_name')||'工作计划';
  document.getElementById('site-name').textContent=name;
  document.getElementById('page-title').textContent=name;
}
function startEditName(){
  const el=document.getElementById('site-name');
  const inp=document.getElementById('site-name-edit');
  inp.value=el.textContent;
  el.style.display='none';inp.style.display='block';inp.focus();inp.select();
}
function saveEditName(){
  const inp=document.getElementById('site-name-edit');
  const el=document.getElementById('site-name');
  const v=inp.value.trim()||'工作计划';
  localStorage.setItem('site_name',v);
  el.textContent=v;document.getElementById('page-title').textContent=v;
  el.style.display='';inp.style.display='none';
}

// ── STORAGE ──
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function gkey(d){return'plan_'+fmt(d)}
function load(d){try{const r=localStorage.getItem(gkey(d));return r?JSON.parse(r):null}catch{return null}}
function saveDayData(){
  const data=gather();
  localStorage.setItem(gkey(currentDate),JSON.stringify(data));showSaved()
}
function gather(){
  const todos=[];
  document.querySelectorAll('.tcard').forEach((c,i)=>{
    const esec=c.querySelector('.esec');
    const actualSegs=[...c.querySelectorAll('.todo-segs .time-seg')].map(s=>({start:s.querySelector('.seg-s')?.value||'',end:s.querySelector('.seg-e')?.value||''})).filter(s=>s.start||s.end);
    todos.push({
      id:c.dataset.id,text:c.querySelector('.ttxt')?.value||'',
      planStart:c.querySelector('.eps')?.value||'',planEnd:c.querySelector('.epe')?.value||'',
      actualSegs,
      priority:parseInt(c.dataset.priority)||i+1,done:c.classList.contains('done'),
      note:c.querySelector('.enote')?.value||'',
      execOpen:esec?esec.style.display!=='none':true
    });
  });
  const otasks=[];
  document.querySelectorAll('.otask').forEach(el=>{
    const v=el.querySelector('.otask-txt')?.value||'';
    const exec=el.querySelector('.otask-exec');
    const actualSegs=[...el.querySelectorAll('.otask-segs-wrap .time-seg')].map(s=>({start:s.querySelector('.seg-s')?.value||'',end:s.querySelector('.seg-e')?.value||''})).filter(s=>s.start||s.end);
    if(v)otasks.push({text:v,done:el.classList.contains('ck'),actualSegs,note:el.querySelector('.otnote')?.value||'',execOpen:exec?exec.style.display!=='none':false,movedToNext:el.dataset.movedToNext||'',deferredFrom:el.dataset.deferredFrom||''});
  });
  const memos=[];
  document.querySelectorAll('.memo-item').forEach(el=>{
    const v=el.querySelector('.memo-ta')?.value||'';
    if(v)memos.push({text:v,done:el.classList.contains('ck'),movedToNext:el.dataset.movedToNext||''});
  });
  return{
    date:fmt(currentDate),
    todos,otasks,memos
  };
}
function showSaved(){clearTimeout(saveT);const e=document.getElementById('saved');e.classList.add('show');saveT=setTimeout(()=>e.classList.remove('show'),1400)}

// ── UNIFIED TIMELINE ──
function renderUnifiedTimeline(){
  const ax=document.getElementById('utl-ax');
  const rows=document.getElementById('utl-rows');
  if(!ax||!rows)return;
  ax.innerHTML='';rows.innerHTML='';

  const fmt2=m=>`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;

  // ── 1. Collect all events with a sort key (actual start > plan start) ──
  const events=[]; // {type:'todo'|'otask', sortMin, endMin, data}

  document.querySelectorAll('.tcard').forEach(c=>{
    const ps=c.querySelector('.eps')?.value||'';
    const pe=c.querySelector('.epe')?.value||'';
    const txt=c.querySelector('.ttxt')?.value||'';
    const done=c.classList.contains('done');
    const note=c.querySelector('.enote')?.value||'';
    if(!txt)return;
    // Collect all actual segments
    const segs=[...c.querySelectorAll('.todo-segs .time-seg')].map(s=>({as:s.querySelector('.seg-s')?.value||'',ae:s.querySelector('.seg-e')?.value||''})).filter(s=>s.as||s.ae);
    const hasActual=segs.some(s=>s.as);
    if(!hasActual&&!ps)return; // nothing to show
    if(hasActual){
      segs.forEach((seg,si)=>{
        const as=seg.as,ae=seg.ae;
        if(!as)return;
        function getAtype(){
          if(si===0&&ps&&pe&&as&&ae){
            const durDiff=timeToMin(ae)-timeToMin(as)-(timeToMin(pe)-timeToMin(ps));
            const startDiff=timeToMin(as)-timeToMin(ps);
            if(Math.abs(durDiff)>=1||Math.abs(startDiff)>=1) return 'deviation';
          }
          if(done) return 'done';
          return 'same';
        }
        const sortMin=timeToMin(as);
        const endMin=ae?timeToMin(ae):sortMin+1;
        const segLabel=segs.length>1?` (第${si+1}段)`:'';
        events.push({type:'todo',sortMin,endMin,data:{txt:txt+segLabel,ps:si===0?ps:'',pe:si===0?pe:'',as,ae,done,note:si===0?note:'',isPlan:si===0&&!!ps,isActual:true,atype:getAtype(),segIndex:si,totalSegs:segs.length}});
      });
    } else {
      // Plan-only (no actual), show once anchored to plan start
      const sortMin=timeToMin(ps);
      const endMin=pe?timeToMin(pe):sortMin+1;
      events.push({type:'todo',sortMin,endMin,data:{txt,ps,pe,as:'',ae:'',done,note,isPlan:true,isActual:false,atype:'same',segIndex:0,totalSegs:0}});
    }
  });

  document.querySelectorAll('.otask').forEach(el=>{
    const txt=el.querySelector('.otask-txt')?.value||'';
    const note=el.querySelector('.otnote')?.value||'';
    const done=el.classList.contains('ck');
    if(!txt)return;
    const segs=[...el.querySelectorAll('.otask-segs-wrap .time-seg')].map(s=>({as:s.querySelector('.seg-s')?.value||'',ae:s.querySelector('.seg-e')?.value||''})).filter(s=>s.as);
    if(!segs.length)return;
    segs.forEach((seg,si)=>{
      const as=seg.as,ae=seg.ae;
      const sortMin=timeToMin(as);
      const endMin=ae?timeToMin(ae):sortMin+1;
      const segLabel=segs.length>1?` (第${si+1}段)`:'';
      events.push({type:'otask',sortMin,endMin,data:{txt:txt+segLabel,as,ae,note:si===0?note:'',done}});
    });
  });

  // 小任务不出现在时间轴主体，只显示在底部已完成区

  // Sort by actual/plan start time
  events.sort((a,b)=>a.sortMin-b.sortMin);

  // ── 2. Merge intervals to find gaps ──
  const intervals=events.map(e=>({s:e.sortMin,e:e.endMin}));
  const merged=[];
  intervals.forEach(iv=>{
    if(!merged.length||iv.s>=merged[merged.length-1].e) merged.push({...iv});
    else merged[merged.length-1].e=Math.max(merged[merged.length-1].e,iv.e);
  });
  // Map: after which merged-interval-index does each gap sit?
  const gaps=[];
  for(let i=0;i<merged.length-1;i++){
    const dur=merged[i+1].s-merged[i].e;
    if(dur>=5) gaps.push({afterEndMin:merged[i].e,startMin:merged[i].e,endMin:merged[i+1].s,dur});
  }

  // ── 3. Build a flat render list: hour-label | event-row | gap-row ──
  // Strategy: walk HOURS; for each hour slot, also emit any events+gaps that start in [prevH, curH)
  // But since events can start at non-hour times, we need a merged pass.

  // Build sorted sequence of "things to render": hour-ticks + events + gaps
  const items=[]; // {kind:'hour'|'event'|'gap', sortMin, ...}
  HOURS.forEach(h=>items.push({kind:'hour',sortMin:parseInt(h)*60,label:h}));
  events.forEach((ev,i)=>items.push({kind:'event',sortMin:ev.sortMin,endMin:ev.endMin,ev}));
  gaps.forEach(g=>items.push({kind:'gap',sortMin:g.startMin,gap:g}));
  items.sort((a,b)=>{
    if(a.sortMin!==b.sortMin) return a.sortMin-b.sortMin;
    // at same time: hour first, then events, then gaps
    const order={hour:0,event:1,gap:2};
    return order[a.kind]-order[b.kind];
  });

  // ── 4. Column header ──
  const hdr=document.createElement('div');hdr.className='utl-col-hdr';
  hdr.innerHTML='<div class="utl-hdr-cell">事项</div><div class="utl-hdr-cell">计划时间</div><div class="utl-hdr-cell">实际时间</div>';
  rows.appendChild(hdr);

  // ── 5. Render items ──
  const renderedEvents=new Set();

  items.forEach(item=>{
    if(item.kind==='hour'){
      // axis hidden — no output needed
    }

    else if(item.kind==='event'){
      const evKey=item.ev.sortMin+'_'+item.ev.data.txt;
      if(renderedEvents.has(evKey))return;
      renderedEvents.add(evKey);

      // Row
      const ev=item.ev;
      const t=ev.data;
      const row=document.createElement('div');row.className='utl-row';

      if(ev.type==='todo'){
        row.classList.add('has-plan');
        if(t.atype==='deviation') row.classList.add('is-deviation');
      } else if(ev.type==='otask') {
        row.classList.add('has-extra','no-plan');
      } else {
        row.classList.add('has-extra','no-plan');
        row.style.background='linear-gradient(to right,rgba(139,105,20,.04),transparent)';
      }

      const colName=document.createElement('div');colName.className='utl-col-name';
      const colPlan=document.createElement('div');colPlan.className='utl-col-plan';
      const colActual=document.createElement('div');colActual.className='utl-col-actual';

      if(ev.type==='todo'){
        const nameEntry=document.createElement('div');nameEntry.className='utl-name-entry';
        const dot=document.createElement('span');dot.className='utl-plan-dot'+(t.isPlan?'':' is-cont');
        if(!t.isPlan){dot.style.background='var(--bl)';dot.style.borderRadius='2px';}
        const txt2=document.createElement('span');txt2.className='utl-plan-txt'+(t.done?' is-done':'');
        txt2.textContent=t.txt;
        nameEntry.appendChild(dot);nameEntry.appendChild(txt2);
        colName.appendChild(nameEntry);
        if(t.note){const note=document.createElement('div');note.className='utl-note';note.style.whiteSpace='pre-wrap';note.textContent='↳ '+t.note;colName.appendChild(note);}

        const planSlot=document.createElement('div');planSlot.className='utl-plan-slot';
        if(t.isPlan){
          const badge=document.createElement('span');badge.className='utl-time-badge plan';
          let planTxt=t.ps+(t.pe?'–'+t.pe:'');
          if(t.ps&&t.pe){const dur=timeToMin(t.pe)-timeToMin(t.ps);if(dur>0)planTxt+='（'+dur+'分钟）';}
          badge.textContent=planTxt;
          planSlot.appendChild(badge);
        }
        colPlan.appendChild(planSlot);

        const actSlot=document.createElement('div');actSlot.className='utl-actual-slot';
        if(t.isActual){
          const badge=document.createElement('span');
          const cls=t.atype==='done'?'actual-done':t.atype==='deviation'?'actual-deviation':'actual-same';
          badge.className=`utl-time-badge ${cls}`;
          let actTxt=t.as+(t.ae?'–'+t.ae:'');
          if(t.as&&t.ae){const dur=timeToMin(t.ae)-timeToMin(t.as);if(dur>0)actTxt+='（'+dur+'分钟）';}
          badge.textContent=actTxt;
          actSlot.appendChild(badge);
          if(t.atype==='deviation'&&t.ps&&t.pe&&t.as&&t.ae){
            const planDur=timeToMin(t.pe)-timeToMin(t.ps);
            const actDur=timeToMin(t.ae)-timeToMin(t.as);
            const durDiff=actDur-planDur;
            const startDiff=timeToMin(t.as)-timeToMin(t.ps);
            const showDiff=Math.abs(durDiff)>=1?durDiff:startDiff;
            if(showDiff!==0){
              const db=document.createElement('span');
              db.className='utl-diff-badge '+(showDiff>0?'over':'under');
              db.textContent=(showDiff>0?'+':'')+showDiff+'分';
              actSlot.appendChild(db);
            }
          }
        }
        colActual.appendChild(actSlot);

      } else if(ev.type==='otask') {
        // otask
        const nameEntry=document.createElement('div');nameEntry.className='utl-name-entry';
        const tag=document.createElement('span');tag.className='utl-extra-tag';tag.textContent='临时';
        const txt3=document.createElement('span');txt3.className='utl-plan-txt'+(t.done?' is-done':'');
        if(t.done)txt3.style.textDecoration='line-through';
        txt3.textContent=t.txt;
        nameEntry.appendChild(tag);nameEntry.appendChild(txt3);
        colName.appendChild(nameEntry);
        if(t.note){const note=document.createElement('div');note.className='utl-note';note.style.whiteSpace='pre-wrap';note.textContent='↳ '+t.note;colName.appendChild(note);}

        colPlan.appendChild(document.createElement('div')); // empty

        const actSlot=document.createElement('div');actSlot.className='utl-actual-slot';
        const badge=document.createElement('span');badge.className='utl-time-badge actual-extra';
        let otaskTxt=t.as+(t.ae?'–'+t.ae:'');
        if(t.as&&t.ae){const dur=timeToMin(t.ae)-timeToMin(t.as);if(dur>0)otaskTxt+='（'+dur+'分钟）';}
        badge.textContent=otaskTxt;
        actSlot.appendChild(badge);
        colActual.appendChild(actSlot);
      }

      row.appendChild(colName);row.appendChild(colPlan);row.appendChild(colActual);
      rows.appendChild(row);
    }

    else if(item.kind==='gap'){
      const g=item.gap;
      const dh=Math.floor(g.dur/60),dm=g.dur%60;
      const durTxt=dh>0?(dm>0?dh+'h'+dm+'分':dh+'h'):dm+'分';

      // Row: gap indicator with duration badge on left
      const rowGap=document.createElement('div');
      rowGap.style.cssText='display:flex;align-items:center;min-height:24px;padding:3px 7px;border-bottom:1px dashed rgba(42,92,63,.2);background:rgba(42,92,63,.04)';
      const durBadge=document.createElement('span');durBadge.className='utl-gap-badge';
      durBadge.style.cssText='margin-right:8px;flex-shrink:0';
      durBadge.textContent=durTxt;
      const ruleEl=document.createElement('div');ruleEl.className='utl-gap-rule';ruleEl.style.cssText='flex:1;height:1px';
      const lblEl=document.createElement('span');lblEl.className='utl-gap-label';
      lblEl.style.cssText='margin-left:8px;white-space:nowrap;font-size:10px;font-weight:500;color:rgba(42,92,63,.75)';
      lblEl.textContent=`空闲 ${fmt2(g.startMin)}–${fmt2(g.endMin)}`;
      rowGap.appendChild(durBadge);rowGap.appendChild(ruleEl);rowGap.appendChild(lblEl);
      rows.appendChild(rowGap);
    }
  });

  // ── 6. Mini completed tasks section (done, no time on timeline) ──
  const miniItems=[];

  document.querySelectorAll('.tcard').forEach(c=>{
    const ps=c.querySelector('.eps')?.value||'';
    const segs=[...c.querySelectorAll('.todo-segs .time-seg')].map(s=>s.querySelector('.seg-s')?.value||'').filter(Boolean);
    const done=c.classList.contains('done');
    const txt=c.querySelector('.ttxt')?.value||'';
    const note=c.querySelector('.enote')?.value||'';
    if(!txt)return;
    if(!segs.length&&!ps&&done) miniItems.push({type:'todo',txt,note});
  });

  document.querySelectorAll('.otask').forEach(el=>{
    const segs=[...el.querySelectorAll('.otask-segs-wrap .time-seg')].map(s=>s.querySelector('.seg-s')?.value||'').filter(Boolean);
    const done=el.classList.contains('ck');
    const txt=el.querySelector('.otask-txt')?.value||'';
    const note=el.querySelector('.otnote')?.value||'';
    if(!txt)return;
    if(!segs.length&&done) miniItems.push({type:'otask',txt,note});
  });

  document.querySelectorAll('.memo-item').forEach(el=>{
    const done=el.classList.contains('ck');
    const txt=el.querySelector('.memo-ta')?.value||'';
    if(!txt||!done)return;
    miniItems.push({type:'memo',txt,note:''});
  });

  if(miniItems.length>0){
    const miniSec=document.createElement('div');miniSec.className='utl-mini-section';
    const miniTitle=document.createElement('div');miniTitle.className='utl-mini-title';
    miniTitle.textContent='已完成小任务 '+miniItems.length+'项';
    miniSec.appendChild(miniTitle);
    miniItems.forEach(item=>{
      const row=document.createElement('div');row.className='utl-mini-row';
      const chk=document.createElement('span');chk.className='utl-mini-check';chk.textContent='✓';
      const tagMap={todo:'待办',otask:'临时',memo:'小任务'};
      const tag=document.createElement('span');tag.className='utl-mini-tag tag-'+item.type;tag.textContent=tagMap[item.type];
      const inner=document.createElement('div');inner.style.cssText='flex:1;display:flex;flex-direction:column;gap:2px;min-width:0';
      const txtEl=document.createElement('span');txtEl.className='utl-mini-txt';txtEl.textContent=item.txt;
      inner.appendChild(txtEl);
      if(item.note){const noteEl=document.createElement('span');noteEl.className='utl-mini-note';noteEl.textContent='↳ '+item.note;inner.appendChild(noteEl);}
      row.appendChild(chk);row.appendChild(tag);row.appendChild(inner);
      miniSec.appendChild(row);
    });
    rows.appendChild(miniSec);
  }
}

function timeToMin(s){if(!s)return 0;const[h,m]=s.split(':').map(Number);return h*60+(m||0)}

function buildCard(pre){
  const list=document.getElementById('tlist');
  const id=pre?.id||('t_'+Date.now()+'_'+Math.random().toString(36).slice(2,6));

  const c=document.createElement('div');

  const pc=priority===1?'':(priority===2?' p2':' p3');

  c.innerHTML=`
<div class="ttop">
  <span class="drag-handle">⠿</span>
  <div class="tpri${pc}">${priority}</div>
  <div class="tchk ${pre?.done?'ck':''}">${pre?.done?'✓':''}</div>
  <div class="tbody">
    <textarea class="ttxt" rows="1" placeholder="待办事项…" oninput="ar(this);saveDayData();renderUnifiedTimeline()">${pre?.text||''}</textarea>
    <div class="tmeta">
      ${pre?.planStart?`<span class="ttime">${pre.planStart}${pre.planEnd?'–'+pre.planEnd:''}</span>`:''}
    </div>
  </div>
  <div class="tacts">
    <button class="ib" onclick="moveTd(this,-1)" title="上移">↑</button>
    <button class="ib" onclick="moveTd(this,1)" title="下移">↓</button>
    <button class="otask-mv" onclick="moveTdToNextDay(this)" title="挪到明天" style="font-size:9px;padding:1px 6px">→明</button>
    <button class="etoggle" onclick="toggleExec(this)">执行 ${execOpen?'▴':'▾'}</button>
    <button class="ib" onclick="removeTd(this)" title="删除">×</button>
  </div>
</div>
<div class="esec" style="${execOpen?'':'display:none'}">
  <div class="etimes" style="grid-template-columns:1fr 1fr;margin-bottom:4px">
    <div class="etf"><div class="etl">计划开始</div><input class="eti eps" list="dl-t" type="text" placeholder="09:00" value="${pre?.planStart||''}" oninput="onPlanTimeChange(this);saveDayData();renderUnifiedTimeline()"></div>
    <div class="etf"><div class="etl">计划结束</div><input class="eti epe" list="dl-t" type="text" placeholder="10:00" value="${pre?.planEnd||''}" oninput="saveDayData();renderUnifiedTimeline()"></div>
  </div>
  <div class="time-segs todo-segs"></div>

</div>`;
  list.appendChild(c);
  ar(c.querySelector('.ttxt'));
  // Bind drag events directly
  c.setAttribute('draggable','true');
  c.ondragstart=ev=>todoDragStart(ev,c);
  c.ondragover=ev=>todoDragOver(ev,c);
  c.ondrop=ev=>todoDrop(ev,c);
  c.ondragend=()=>todoDragEnd(c);
  // Restore saved segments
  const segsContainer=c.querySelector('.todo-segs');
  const segs=pre?.actualSegs||(pre?.actualStart?[{start:pre.actualStart,end:pre.actualEnd||''}]:[]);
  if(segs.length===0) segs.push({start:'',end:''});
  segs.forEach(s=>addTodoSegRow(segsContainer,s.start,s.end));
}

function addTodoSegRow(container,startVal,endVal){
  const seg=document.createElement('div');seg.className='time-seg';
  seg.innerHTML=`<div class="etf"><div class="time-seg-lbl">实际开始</div><input class="eti seg-s" list="dl-t" type="text" placeholder="09:15" value="${startVal}"></div><div class="etf"><div class="time-seg-lbl">实际结束</div><input class="eti seg-e" list="dl-t" type="text" placeholder="10:30" value="${endVal}"></div><button class="time-seg-del" title="删除此段">×</button>`;
  seg.querySelectorAll('input').forEach(i=>i.addEventListener('input',()=>{onTodoActualTimeChange(i);saveDayData();renderUnifiedTimeline();}));
  seg.querySelector('.time-seg-del').onclick=()=>{
    const segs=container;
    if(segs.children.length<=1){seg.querySelectorAll('input').forEach(i=>i.value='');}
    else{seg.remove();}
    onTodoActualTimeChange(container.closest('.esec').querySelector('.seg-s'));
    saveDayData();renderUnifiedTimeline();
  };
  container.appendChild(seg);
}
function cycleStatus(el){
  const cur=el.dataset.status;const next=SCYCLE[(SCYCLE.indexOf(cur)+1)%SCYCLE.length];
  el.dataset.status=next;el.className='estat '+next;el.textContent=SL[next];
  const c=el.closest('.tcard');
  if(next==='done'){c.classList.add('done');const chk=c.querySelector('.tchk');chk.classList.add('ck');chk.textContent='✓'}
  else if(cur==='done'){c.classList.remove('done');const chk=c.querySelector('.tchk');chk.classList.remove('ck');chk.textContent=''}
  saveDayData();updateStats();renderUnifiedTimeline();
}
function toggleDone(chk){
  const c=chk.closest('.tcard');const done=!c.classList.contains('done');
  c.classList.toggle('done',done);chk.classList.toggle('ck',done);chk.textContent=done?'✓':'';
  saveDayData();updateStats();renderUnifiedTimeline();
}
function onTodoActualTimeChange(inp){
  const c=inp?.closest('.tcard');
  if(!c)return;
  // Check if any segment has both start and end filled
  const segs=[...c.querySelectorAll('.todo-segs .time-seg')];
  const anyComplete=segs.some(s=>s.querySelector('.seg-s')?.value&&s.querySelector('.seg-e')?.value);
  if(anyComplete&&!c.classList.contains('done')){
    c.classList.add('done');
    const chk=c.querySelector('.tchk');chk.classList.add('ck');chk.textContent='✓';
  } else if(!anyComplete&&c.classList.contains('done')){
    c.classList.remove('done');
    const chk=c.querySelector('.tchk');chk.classList.remove('ck');chk.textContent='';
  }
  updateStats();
}
function cyclePri(el){
  const c=el.closest('.tcard');let p=parseInt(c.dataset.priority)||1;p=p>=3?1:p+1;
  c.dataset.priority=p;el.textContent=p;el.className='tpri'+(p===1?'':(p===2?' p2':' p3'));saveDayData();
}
function moveTd(btn,dir){
  const c=btn.closest('.tcard'),list=c.parentElement,items=[...list.children],idx=items.indexOf(c),tgt=items[idx+dir];
  if(!tgt)return;dir===-1?list.insertBefore(c,tgt):list.insertBefore(tgt,c);
  reindex();saveDayData();renderUnifiedTimeline();
}
function removeTd(btn){
  const c=btn.closest('.tcard');
  c.remove();reindex();saveDayData();updateStats();renderUnifiedTimeline();
}
function reindex(){
  document.querySelectorAll('.tcard').forEach((c,i)=>{
    c.dataset.priority=i+1;const b=c.querySelector('.tpri');
    b.textContent=i+1;b.className='tpri'+(i===0?'':(i===1?' p2':' p3'));
  });
}
function updateStats(){
  const cs=document.querySelectorAll('.tcard'),dn=document.querySelectorAll('.tcard.done');
  const tot=document.getElementById('s-tot');const rate=document.getElementById('s-rate');
  if(tot)tot.textContent=cs.length;
  if(rate)rate.textContent=cs.length?Math.round(dn.length/cs.length*100)+'%':'0%';
}
function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}

// ── OTHER TASKS ──
function addOtask(pre){
  const list=document.getElementById('otask-list');
  const div=document.createElement('div');
  div.className='otask'+(pre?.done?' ck':'');
  div.draggable=true;
  div.addEventListener('dragstart',e=>otaskListDragStart(e,div));
  div.addEventListener('dragover',e=>otaskListDragOver(e,div));
  div.addEventListener('drop',e=>otaskListDrop(e,div));
  div.addEventListener('dragend',()=>otaskListDragEnd());
  if(pre?.deferredFrom)div.dataset.deferredFrom=pre.deferredFrom;
  const execOpen=pre?.execOpen||false;

  // top row: checkbox + text + toggle + delete
  const topRow=document.createElement('div');topRow.className='otask-top';
  const chk=document.createElement('div');chk.className='otask-chk'+(pre?.done?' ck':'');chk.textContent=pre?.done?'✓':'';
  // 不支持手动打勾，只能通过填写实际时间段自动打勾
  const inp=document.createElement('input');inp.type='text';inp.className='otask-txt';inp.placeholder='其他事项…';inp.value=pre?.text||'';
  inp.addEventListener('input',()=>{saveDayData();renderUnifiedTimeline()});

  const toggle=document.createElement('button');toggle.className='otask-toggle';
  toggle.textContent='执行 '+(execOpen?'▴':'▾');
  toggle.onclick=()=>{
    const exec=div.querySelector('.otask-exec');
    const open=exec.style.display==='none';
    exec.style.display=open?'':'none';
    toggle.textContent='执行 '+(open?'▴':'▾');
    saveDayData();
  };

  const del=document.createElement('button');del.className='otask-del';del.textContent='×';
  del.onclick=()=>{
    const deferredFrom=div.dataset.deferredFrom||'';
    if(deferredFrom){
      const srcKey='plan_'+deferredFrom;
      let srcData={};try{const r=localStorage.getItem(srcKey);if(r)srcData=JSON.parse(r)}catch{}
      if(srcData.otasks){
        const text=div.querySelector('.otask-txt')?.value||'';
        srcData.otasks=srcData.otasks.map(o=>o.text===text?{...o,movedToNext:''}:o);
        localStorage.setItem(srcKey,JSON.stringify(srcData));
        if(fmt(currentDate)===deferredFrom){div.remove();saveDayData();renderUnifiedTimeline();renderDaily();return}
      }
    }
    div.remove();saveDayData();renderUnifiedTimeline();
  };

  const mv=document.createElement('button');mv.className='otask-mv';mv.title='推迟到明天';mv.textContent='→明';
  mv.onclick=()=>moveOtaskToNextDay(div);
  // Restore deferred visual state if previously saved
  if(pre?.movedToNext){
    div.dataset.movedToNext=pre.movedToNext;
    setTimeout(()=>applyOtaskDeferredStyle(div,pre.movedToNext),0);
  }

  const drag=document.createElement('span');drag.className='drag-handle';drag.title='拖动排序';drag.textContent='⠿';
  topRow.appendChild(drag);topRow.appendChild(chk);topRow.appendChild(inp);topRow.appendChild(mv);topRow.appendChild(toggle);topRow.appendChild(del);

  // exec section: times + note (collapsible)
  const execSec=document.createElement('div');execSec.className='otask-exec';
  execSec.style.display=execOpen?'':'none';

  const segsWrap=document.createElement('div');segsWrap.className='time-segs otask-segs-wrap';
  const addSegBtn=document.createElement('button');addSegBtn.className='add-seg-btn';addSegBtn.textContent='＋ 添加实际时间段';
  addSegBtn.onclick=()=>{addOtaskSegRow(segsWrap,div,chk,'','');saveDayData();renderUnifiedTimeline();};

  const oSegs=pre?.actualSegs||(pre?.actualStart?[{start:pre.actualStart,end:pre.actualEnd||''}]:[]);
  if(oSegs.length===0)oSegs.push({start:'',end:''});
  oSegs.forEach(s=>addOtaskSegRow(segsWrap,div,chk,s.start,s.end));

  const noteTA=document.createElement('textarea');noteTA.className='otnote';
  noteTA.placeholder='备注：遇到什么问题？如何解决？';noteTA.value=pre?.note||'';
  noteTA.addEventListener('input',()=>{saveDayData();renderUnifiedTimeline()});

  execSec.appendChild(segsWrap);execSec.appendChild(addSegBtn);execSec.appendChild(noteTA);
  div.appendChild(topRow);div.appendChild(execSec);
  list.appendChild(div);
}

function addOtaskSegRow(container,div,chk,startVal,endVal){
  const seg=document.createElement('div');seg.className='time-seg otask-seg';
  seg.innerHTML=`<div class="etf"><div class="time-seg-lbl">实际开始</div><input class="oti seg-s" list="dl-t" type="text" placeholder="09:00" value="${startVal}"></div><div class="etf"><div class="time-seg-lbl">实际结束</div><input class="oti seg-e" list="dl-t" type="text" placeholder="10:00" value="${endVal}"></div><button class="time-seg-del" title="删除此段">×</button>`;
  seg.querySelectorAll('input').forEach(i=>i.addEventListener('input',()=>{
    const segs=[...container.querySelectorAll('.time-seg')];
    const anyComplete=segs.some(s=>s.querySelector('.seg-s')?.value&&s.querySelector('.seg-e')?.value);
    if(anyComplete&&!div.classList.contains('ck')){div.classList.add('ck');chk.classList.add('ck');chk.textContent='✓';}
    else if(!anyComplete&&div.classList.contains('ck')){div.classList.remove('ck');chk.classList.remove('ck');chk.textContent='';}
    saveDayData();renderUnifiedTimeline();
  }));
  seg.querySelector('.time-seg-del').onclick=()=>{
    if(container.children.length<=1){seg.querySelectorAll('input').forEach(i=>i.value='');}
    else{seg.remove();}
    saveDayData();renderUnifiedTimeline();
  };
  container.appendChild(seg);
}

function moveOtaskToNextDay(div){
  const text=div.querySelector('.otask-txt')?.value||'';
  const note=div.querySelector('.otnote')?.value||'';
  if(!text)return;
  const tomorrow=new Date(currentDate.getTime()+86400000);
  const tomorrowKey='plan_'+fmt(tomorrow);
  let tData={};try{const r=localStorage.getItem(tomorrowKey);if(r)tData=JSON.parse(r)}catch{}
  if(!tData.otasks)tData.otasks=[];
  if(!tData.otasks.some(o=>o.text===text)){
    tData.otasks.push({text,done:false,note,actualSegs:[],execOpen:!!note,deferredFrom:fmt(currentDate)});
    localStorage.setItem(tomorrowKey,JSON.stringify(tData));
    const dateStr=(tomorrow.getMonth()+1)+'/'+(tomorrow.getDate());
    div.dataset.movedToNext=dateStr;
    saveDayData();
    applyOtaskDeferredStyle(div,dateStr);
  } else {
    alert('明天已有相同安排');
  }
}

function applyOtaskDeferredStyle(div,dateStr){
  const inp=div.querySelector('.otask-txt');
  if(inp){inp.style.textDecoration='line-through';inp.style.color='var(--ink-m)'}
  const mv=div.querySelector('.otask-mv');
  if(mv){
    mv.textContent='→'+dateStr;
    mv.style.color='var(--am)';mv.style.borderColor='var(--am)';mv.style.background='var(--am-l)';
    mv.disabled=true;mv.style.cursor='default';
  }
}

function restoreOtaskFromDeferred(div){
  const inp=div.querySelector('.otask-txt');
  if(inp){inp.style.textDecoration='';inp.style.color=''}
  const mv=div.querySelector('.otask-mv');
  if(mv){
    mv.textContent='→明';
    mv.style.color='';mv.style.borderColor='';mv.style.background='';
    mv.disabled=false;mv.style.cursor='pointer';
  }
  delete div.dataset.movedToNext;
  saveDayData();
}

function moveTdToNextDay(btn){
  const c=btn.closest('.tcard');
  const text=c.querySelector('.ttxt')?.value||'';
  const ps=c.querySelector('.eps')?.value||'';
  const pe=c.querySelector('.epe')?.value||'';
  const note=c.querySelector('.enote')?.value||'';
  if(!text)return;
  const tomorrow=new Date(currentDate.getTime()+86400000);
  const key='plan_'+fmt(tomorrow);
  let data={};try{const r=localStorage.getItem(key);if(r)data=JSON.parse(r)}catch{}
  if(!data.todos)data.todos=[];
  if(!data.todos.some(t=>t.text===text)){
    data.todos.push({id:'t_'+fmt(tomorrow)+'_'+Math.random().toString(36).slice(2,6),text,planStart:ps,planEnd:pe,note,done:false,actualSegs:[],execOpen:!!note,priority:data.todos.length+1});
    localStorage.setItem(key,JSON.stringify(data));
    // visual: just update button label to confirm, no strikethrough
    btn.textContent='→'+(tomorrow.getMonth()+1)+'/'+(tomorrow.getDate());
    btn.style.color='var(--am)';btn.style.borderColor='var(--am)';btn.style.background='var(--am-l)';
    btn.disabled=true;btn.style.cursor='default';
  } else {
    alert('明天已有相同待办');
  }
}

// ── MONTHLY ──
function renderMonthly(){
  const y=currentYear,m=currentMonth;
  document.getElementById('m-main').textContent=`${y} 年 ${MCN[m]}`;
  buildYearOpts('m-sel-year',y);buildMonthOpts('m-sel-month',m);
  const first=new Date(y,m,1),sd=first.getDay(),dim=new Date(y,m+1,0).getDate();
  let tt=0,td=0,rd=0;
  const g=document.getElementById('mgrid');g.innerHTML='';
  WD.forEach(d=>{const h=document.createElement('div');h.className='mhdr';h.textContent=d;g.appendChild(h)});
  const ts=fmt(new Date());
  for(let i=0;i<sd;i++){const c=document.createElement('div');c.className='mc om';c.innerHTML=`<div class="mcd">&nbsp;</div>`;g.appendChild(c)}
  for(let d=1;d<=dim;d++){
    const date=new Date(y,m,d),ds=fmt(date),data=load(date);
    const c=document.createElement('div');c.className='mc'+(ds===ts?' td':'');
    c.onclick=()=>{currentDate=date;document.querySelectorAll('.nb')[0].click()};
    let dots='',comp='';
    if(data){rd++;const todos=data.todos||[];const dn=todos.filter(t=>t.done).length;tt+=todos.length;td+=dn;const r=todos.length?Math.round(dn/todos.length*100):0;todos.forEach(t=>{dots+=`<div class="mdot ${t.done?'dn':''}"></div>`});comp=todos.length?`${r}%`:''}
    c.innerHTML=`<div class="mcd">${d}</div><div class="mdots">${dots}</div>${comp?`<div class="mcomp">${comp}</div>`:''}`;
    g.appendChild(c);
  }
  const r=tt?Math.round(td/tt*100):0;
  document.getElementById('m-days').textContent=rd;document.getElementById('m-todos').textContent=tt;
  document.getElementById('m-done').textContent=td;document.getElementById('m-rate').textContent=r+'%';
}

// ── YEARLY ──
function renderYearly(){
  document.getElementById('y-main').textContent=currentYear+' 年';
  buildYearOpts('y-sel-year',currentYear);
  const c=document.getElementById('ygrid');c.innerHTML='';
  let yt=0,yd=0,ydy=0;
  for(let m=0;m<12;m++){
    const dim=new Date(currentYear,m+1,0).getDate();let mt=0,md=0,mdy=0;
    for(let d=1;d<=dim;d++){const data=load(new Date(currentYear,m,d));if(data&&(data.todos?.length||data.reflection)){mdy++;const todos=data.todos||[];mt+=todos.length;md+=todos.filter(t=>t.done).length}}
    yt+=mt;yd+=md;ydy+=mdy;
    const r=mt?Math.round(md/mt*100):0;
    const card=document.createElement('div');card.className='ymc';
    card.onclick=()=>{currentMonth=m;document.querySelectorAll('.nb')[1].click()};
    card.innerHTML=`<div class="ymn">${MCN[m]}</div><div class="ymst"><div style="display:flex;justify-content:space-between"><span>记录</span><span>${mdy} 天</span></div><div style="display:flex;justify-content:space-between"><span>待办</span><span>${mt} 项</span></div><div style="display:flex;justify-content:space-between"><span>完成</span><span>${md} 项</span></div></div><div class="pb"><div class="pf" style="width:${r}%"></div></div><div style="font-size:10px;color:var(--ink-m);text-align:right;margin-top:2px;font-family:var(--mo)">${r}%</div>`;
    c.appendChild(card);
  }
  const yr=yt?Math.round(yd/yt*100):0;
  document.getElementById('y-days').textContent=ydy;document.getElementById('y-todos').textContent=yt;
  document.getElementById('y-done').textContent=yd;document.getElementById('y-rate').textContent=yr+'%';
}

// ── EXPORT ──
function toggleExport(){document.getElementById('expp').classList.toggle('open')}

function getExpData(){
  const type=document.getElementById('exp-type').value;let keys=[];
  if(type==='day'){keys=[gkey(currentDate)]}
  else if(type==='month'){const y=currentDate.getFullYear(),m=currentDate.getMonth(),dim=new Date(y,m+1,0).getDate();for(let d=1;d<=dim;d++)keys.push(gkey(new Date(y,m,d)))}
  else if(type==='year'){const y=currentDate.getFullYear();for(let m=0;m<12;m++){const dim=new Date(y,m+1,0).getDate();for(let d=1;d<=dim;d++)keys.push(gkey(new Date(y,m,d)))}}
  else{keys=Object.keys(localStorage).filter(k=>k.startsWith('plan_'))}
  return keys.map(k=>{const r=localStorage.getItem(k);return r?JSON.parse(r):null}).filter(Boolean);
}

function doExport(f){
  const all=getExpData();if(!all.length){alert('所选范围暂无数据');return}
  const n=localStorage.getItem('site_name')||'工作计划';
  if(f==='json'){dl(n+'_'+fmt(new Date())+'.json',JSON.stringify(all,null,2),'application/json')}
  else if(f==='csv'){
    const rows=[['日期','序号','待办','完成','状态','计划开始','计划结束','实际开始','实际结束','备注','复盘']];
    all.forEach(d=>(d.todos||[]).forEach((t,i)=>rows.push([d.date,i+1,t.text,t.done?'是':'否',SL[t.execStatus||'pending'],t.planStart||'',t.planEnd||'',t.actualStart||'',t.actualEnd||'',t.note||'',d.reflection||''])));
    dl(n+'_'+fmt(new Date())+'.csv','\uFEFF'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n'),'text/csv');
  }else if(f==='txt'){
    let txt=`${n} · 导出\n${new Date().toLocaleString('zh-CN')}\n\n`;
    all.forEach(d=>{
      txt+=`═══ ${d.date} ═══\n计划：${d.planStudy||'—'} 可用：${d.planAvail||'—'} 实际：${d.actStudy||'—'} 专注：${d.actDeep||'—'}\n\n【待办】\n`;
      (d.todos||[]).forEach((t,i)=>{
        const tspan=t.planStart?(t.planStart+(t.planEnd?'–'+t.planEnd:'')):'';
        txt+=`  ${i+1}. [${t.done?'✓':' '}] ${t.text}`+(tspan?' ('+tspan+')':'')+`\n     状态：`+SL[t.execStatus||'pending'];
        if(t.actualStart)txt+=`  实际：${t.actualStart}–${t.actualEnd||'?'}`;
        txt+='\n';
        if(t.note)txt+=`     备注：${t.note}\n`;
      });
      if(d.otasks?.length){txt+='\n【其他事项】\n';d.otasks.forEach(o=>txt+=`  [${o.done?'✓':' '}] ${o.text}\n`)}
      if(d.reflection)txt+=`\n【复盘】\n${d.reflection}\n`;txt+='\n';
    });
    dl(n+'_'+fmt(new Date())+'.txt',txt,'text/plain');
  }else{printDay(all[0])}
}

</div>
<h2>执行时间对比</h2>
${(data.todos||[]).map((t,i)=>{
  const sm={pending:'○',done:'✓',partial:'△',failed:'✗'};
  const pw=t.planStart&&t.planEnd?Math.min(Math.round((timeToMin2(t.planEnd)-timeToMin2(t.planStart))/60*80),80):0;
  const aw=t.actualStart&&t.actualEnd?Math.min(Math.round((timeToMin2(t.actualEnd)-timeToMin2(t.actualStart))/60*80),80):0;
  return`<div style="margin-bottom:3px"><div class="bar-row">${sm[t.execStatus||'pending']} #${i+1} ${t.text}${t.planStart?' '+t.planStart+(t.planEnd?'–'+t.planEnd:''):''}</div>${pw?`<div class="bp" style="width:${pw}%"></div>`:''}${aw?`<div class="ba" style="width:${aw}%;${aw>pw?'background:#8b3a3a':''}"></div>`:''}</div>`;
}).join('')}
<div class="ref"><div style="font-size:7px;color:#2c4a7c;margin-bottom:2px">今日复盘</div><div style="font-size:7.5px;line-height:1.6;white-space:pre-wrap">${data.reflection||''}</div></div>
</div></div></body></html>`);
  w.document.close();setTimeout(()=>w.print(),600);
}
function timeToMin2(s){if(!s)return 0;const[h,m]=s.split(':').map(Number);return h*60+(m||0)}

function dl(name,content,type){const b=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href)}

function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const arr=JSON.parse(ev.target.result);(Array.isArray(arr)?arr:[arr]).forEach(d=>{if(d.date)localStorage.setItem('plan_'+d.date,JSON.stringify(d))});alert(`导入成功！共恢复 ${Array.isArray(arr)?arr.length:1} 天数据。`);renderDaily()}catch{alert('格式有误，请确认是本系统导出的 JSON 文件。')}};
  r.readAsText(file);e.target.value='';
}

// ── WEATHER ──
function setWeather(wx,btn){
  const d=load(currentDate)||{};
  if(d.weather===wx){d.weather='';btn.classList.remove('selected')}
  else{d.weather=wx}
  const data=gather();data.weather=d.weather===wx?'':wx;
  localStorage.setItem(gkey(currentDate),JSON.stringify(data));
  renderWeather(data.weather||'');showSaved();
}
function clearWeather(){
  const data=gather();data.weather='';
  localStorage.setItem(gkey(currentDate),JSON.stringify(data));
  renderWeather('');showSaved();
}
function renderWeather(wx){
  document.querySelectorAll('.wx-btn').forEach(b=>{
    b.classList.toggle('selected',b.dataset.wx===wx);
  });
}

// ── MEMO (小任务：只需打勾，无实际时间) ──
function addMemo(pre){
  const list=document.getElementById('memo-list');
  const div=document.createElement('div');
  div.className='memo-item'+(pre?.done?' ck':'');
  div.draggable=true;
  div.addEventListener('dragstart',e=>memoListDragStart(e,div));
  div.addEventListener('dragover',e=>memoListDragOver(e,div));
  div.addEventListener('drop',e=>memoListDrop(e,div));
  div.addEventListener('dragend',()=>memoListDragEnd());
  if(pre?.movedToNext)div.dataset.movedToNext=pre.movedToNext;

  const topRow=document.createElement('div');topRow.className='memo-item-top';

  const drag=document.createElement('span');drag.className='memo-item-drag';drag.title='拖动排序';drag.textContent='⠿';

  const chk=document.createElement('div');chk.className='memo-chk'+(pre?.done?' ck':'');chk.textContent=pre?.done?'✓':'';
  chk.onclick=()=>{
    div.classList.toggle('ck');chk.classList.toggle('ck');chk.textContent=chk.classList.contains('ck')?'✓':'';
    saveDayData();renderUnifiedTimeline();
  };

  const inp=document.createElement('input');inp.type='text';inp.className='memo-ta';inp.placeholder='小任务…';inp.value=pre?.text||'';
  inp.addEventListener('input',()=>{saveDayData();renderUnifiedTimeline()});

  const mv=document.createElement('button');mv.className='memo-mv';mv.title='推迟到明天';mv.textContent='→明';
  mv.onclick=()=>moveMemoToNextDay(div);
  if(pre?.movedToNext){
    setTimeout(()=>applyMemoDeferredStyle(div,pre.movedToNext),0);
  }

  const del=document.createElement('button');del.className='memo-del';del.textContent='×';
  del.onclick=()=>{div.remove();saveDayData();renderUnifiedTimeline()};

  topRow.appendChild(drag);topRow.appendChild(chk);topRow.appendChild(inp);topRow.appendChild(mv);topRow.appendChild(del);
  div.appendChild(topRow);
  list.appendChild(div);
}

function moveMemoToNextDay(div){
  const text=div.querySelector('.memo-ta')?.value||'';
  const note=div.querySelector('.mnote')?.value||'';
  if(!text)return;
  const tomorrow=new Date(currentDate.getTime()+86400000);
  const tomorrowKey='plan_'+fmt(tomorrow);
  let tData={};try{const r=localStorage.getItem(tomorrowKey);if(r)tData=JSON.parse(r)}catch{}
  if(!tData.memos)tData.memos=[];
  if(!tData.memos.some(m=>m.text===text)){
    tData.memos.push({text,done:false});
    localStorage.setItem(tomorrowKey,JSON.stringify(tData));
    const dateStr=(tomorrow.getMonth()+1)+'/'+(tomorrow.getDate());
    div.dataset.movedToNext=dateStr;
    saveDayData();
    applyMemoDeferredStyle(div,dateStr);
  } else {
    alert('明天已有相同小任务');
  }
}

function applyMemoDeferredStyle(div,dateStr){
  const inp=div.querySelector('.memo-ta');
  if(inp){inp.style.textDecoration='line-through';inp.style.color='var(--ink-m)'}
  const mv=div.querySelector('.memo-mv');
  if(mv){
    mv.textContent='→'+dateStr;
    mv.style.color='var(--am)';mv.style.borderColor='var(--am)';mv.style.background='var(--am-l)';
    mv.disabled=true;mv.style.cursor='default';
  }
}

// ── DRAG: TODO LIST ──
let dragSrcTodo=null;
function initTodoDrag(e,handle){
  const card=handle.closest('.tcard');
  card.setAttribute('draggable','true');
  card.ondragstart=ev=>todoDragStart(ev,card);
  card.ondragover=ev=>todoDragOver(ev,card);
  card.ondrop=ev=>todoDrop(ev,card);
  card.ondragend=()=>todoDragEnd(card);
}
function todoDragStart(e,card){dragSrcTodo=card;card.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function todoDragOver(e,card){e.preventDefault();document.querySelectorAll('.tcard').forEach(c=>c.classList.remove('drag-over'));if(card!==dragSrcTodo)card.classList.add('drag-over')}
function todoDrop(e,card){
  e.preventDefault();
  if(!dragSrcTodo||dragSrcTodo===card)return;
  const list=card.parentElement;
  const cards=[...list.children];
  const srcIdx=cards.indexOf(dragSrcTodo),tgtIdx=cards.indexOf(card);
  if(srcIdx<tgtIdx)list.insertBefore(dragSrcTodo,card.nextSibling);
  else list.insertBefore(dragSrcTodo,card);
  reindex();saveDayData();renderUnifiedTimeline();
}
function todoDragEnd(card){card.classList.remove('dragging');document.querySelectorAll('.tcard').forEach(c=>c.classList.remove('drag-over'))}

// ── DRAG: OTASK LIST ──
let dragSrcOtask=null;
function otaskListDragStart(e,el){dragSrcOtask=el;el.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function otaskListDragOver(e,el){e.preventDefault();document.querySelectorAll('.otask').forEach(c=>c.classList.remove('drag-over'));if(el!==dragSrcOtask)el.classList.add('drag-over')}

  if(!dragSrcOtask||dragSrcOtask===el)return;

  const items=[...list.children];
  const srcIdx=items.indexOf(dragSrcOtask),tgtIdx=items.indexOf(el);
  if(srcIdx<tgtIdx)list.insertBefore(dragSrcOtask,el.nextSibling);
  else list.insertBefore(dragSrcOtask,el);
  saveDayData();
}
function otaskListDragEnd(){dragSrcOtask=null;document.querySelectorAll('.otask').forEach(c=>c.classList.remove('dragging','drag-over'))}

// ── DRAG: MEMO LIST ──
let dragSrcMemo=null;
function memoListDragStart(e,el){dragSrcMemo=el;el.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function memoListDragOver(e,el){e.preventDefault();document.querySelectorAll('.memo-item').forEach(c=>c.classList.remove('drag-over'));if(el!==dragSrcMemo)el.classList.add('drag-over')}
function memoListDrop(e,el){

  if(!dragSrcMemo||dragSrcMemo===el)return;
  const list=el.parentElement;

  if(srcIdx<tgtIdx)list.insertBefore(dragSrcMemo,el.nextSibling);

// ── INIT ──
initTitle();
renderDaily();
</script>
